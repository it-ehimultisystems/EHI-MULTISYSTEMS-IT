<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    
    <!-- iOS PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EHI Ops">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon.png">

    <!-- Prevent phone number detection formatting -->
    <meta name="format-detection" content="telephone=no">

    <!-- Theme color for Safari toolbar -->
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#e7ebf1" media="(prefers-color-scheme: light)">

    <title>EHI Multisystems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('ehi-theme') || 'light';
          document.documentElement.classList.add(t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Branded splash screen — replaced by React when app mounts. Themed
           via html.dark/html.light (set synchronously by the inline script
           above, before this paints) instead of a hardcoded color, so it
           never flashes the wrong theme against whatever LoginScreen/the
           app renders next -- default is light (this app's default theme),
           dark only when html.dark is present. -->
      <style>
        #splash {
          min-height: 100dvh;
          width: 100%;
          background: #e7ebf1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          box-sizing: border-box;
          padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        html.dark #splash { background: #0d1117; }
        #splash .ehi-splash-mark-bg { fill: rgba(201,142,40,0.14); }
        #splash .ehi-splash-mark-text { fill: #C98E28; }
        html.dark #splash .ehi-splash-mark-bg { fill: rgba(240,178,48,0.12); }
        html.dark #splash .ehi-splash-mark-text { fill: #F0B230; }
        #splash .ehi-splash-ring {
          width: 32px; height: 32px;
          border: 3px solid rgba(201,142,40,0.22);
          border-top-color: #C98E28;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        html.dark #splash .ehi-splash-ring {
          border-color: rgba(240,178,48,0.2);
          border-top-color: #F0B230;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div id="splash">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="14" class="ehi-splash-mark-bg" />
          <text x="32" y="42" text-anchor="middle" class="ehi-splash-mark-text" font-size="28" font-weight="800" font-family="monospace">E</text>
        </svg>
        <div class="ehi-splash-ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
